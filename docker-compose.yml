version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: viera
      POSTGRES_DB: pos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos-backend
    restart: unless-stopped
    ports:
      - "2000:2000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: viera
      DB_NAME: pos_db
      JWT_SECRET: change_this_secret_key_production_2024
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:80,http://localhost:5173

  frontend:
    build:
      context: ./tailadmin
      dockerfile: Dockerfile
    container_name: pos-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:2000/api
      VITE_WS_BASE_URL: ws://localhost:2000

volumes:
  postgres_data:
